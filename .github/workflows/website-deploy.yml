name: Deploy Website

on:
  push:
    paths:
      - 'src/**'
      - '_includes/**'
      - '_data/**'
      - 'public/**'
      - 'css/**'
      - '*.md'
      - '.eleventy.js'
      - 'package.json'
      - '.github/workflows/website-deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || 22 }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build website (SASS + Eleventy)
        run: npm run build

      - name: Verify build output
        run: |
          echo "Build output:"
          ls -la _site/ | head -20
          if [ ! -f "_site/index.html" ]; then
            echo "Error: index.html not found in _site after build"
            exit 1
          fi

      - name: Deploy to staging location
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          source: "_site"
          target: "/opt/politechs.uk/website-staging"
          strip_components: 1

      - name: Verify and swap deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          script: |
            # Verify staging has index.html (Eleventy output; strip_components puts _site contents in staging)
            if [ ! -f "/opt/politechs.uk/website-staging/index.html" ]; then
              echo "Error: index.html not found in staging deployment"
              exit 1
            fi

            # Create backup of current deployment (if it exists)
            if [ -d "/opt/politechs.uk/website/webroot" ]; then
              sudo mv /opt/politechs.uk/website/webroot /opt/politechs.uk/website/webroot.backup.$(date +%s)
            fi

            # Atomically swap staging to production (staging dir becomes webroot)
            sudo mkdir -p /opt/politechs.uk/website
            sudo mv /opt/politechs.uk/website-staging /opt/politechs.uk/website/webroot
            sudo chown -R www-data:www-data /opt/politechs.uk/website/webroot

            # Verify production deployment
            if [ ! -f "/opt/politechs.uk/website/webroot/index.html" ]; then
              echo "Error: index.html not found after swap, restoring backup"
              if [ -d /opt/politechs.uk/website/webroot.backup.* ]; then
                sudo rm -rf /opt/politechs.uk/website/webroot
                sudo mv /opt/politechs.uk/website/webroot.backup.* /opt/politechs.uk/website/webroot
              fi
              exit 1
            fi

            # Clean up old backups (keep last 3)
            ls -td /opt/politechs.uk/website/webroot.backup.* 2>/dev/null | tail -n +4 | xargs -r sudo rm -rf

            echo "Deployment successful"
            ls -la /opt/politechs.uk/website/webroot/ | head -20

      - name: Restart nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ env.DEPLOY_PORT }}
          script: |
            sudo systemctl reload nginx
            sudo systemctl status nginx
